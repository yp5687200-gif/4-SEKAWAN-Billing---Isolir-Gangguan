                            <td colspan="5" class="p-6 text-center text-gray-600 italic font-sans">Silahkan pilih target Sector ODP di atas untuk memulai broadcast.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-xl shadow-xl overflow-hidden">
            <div class="p-5 border-b border-gray-800 bg-gray-900 flex justify-between items-center">
                <h2 class="text-md font-bold tracking-wide text-gray-200">🖥️ DATABASE UTAMA PELANGGAN (AUTO-ISOLIR RADAR)</h2>
                <span class="text-xs font-mono text-gray-500 bg-black/40 px-2 py-1 rounded border border-gray-800">Total Loop Data: Realtime</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm text-gray-400">
                    <thead class="bg-gray-950/80 text-xs font-bold tracking-wider text-gray-300 uppercase border-b border-gray-800">
                        <tr>
                            <th class="p-4">Nama User</th>
                            <th class="p-4">WhatsApp</th>
                            <th class="p-4">Cluster ODP</th>
                            <th class="p-4">Paket Data</th>
                            <th class="p-4">Masa Aktif</th>
                            <th class="p-4">Status Core</th>
                            <th class="p-4 text-center">Aksi Manajemen</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPelanggan" class="divide-y divide-gray-800">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let ispChartInstance = null;

        // Set default input tanggal ke hari ini
        document.getElementById('tanggalMulai').value = new Date().toISOString().substring(0, 10);

        document.getElementById('billingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            let whatsapp = document.getElementById('whatsapp').value;
            const paketRaw = document.getElementById('paket').value.split('|');
            const odp = document.getElementById('odp').value;
            const tanggalMulai = document.getElementById('tanggalMulai').value;
            const keterangan = document.getElementById('keterangan').value || '-';

            if (whatsapp.startsWith('0')) whatsapp = '62' + whatsapp.slice(1);

            const dataBaru = {
                id: Date.now(),
                nama,
                whatsapp,
                odp, // Field ODP tersimpan di LocalStorage
                namaPaket: paketRaw[0].replace('_', ' '),
                harga: parseInt(paketRaw[1]),
                tanggalMulai: tanggalMulai,
                keterangan: keterangan
            };

            let database = JSON.parse(localStorage.getItem('netland_isp_db')) || [];
            database.push(dataBaru);
            localStorage.setItem('netland_isp_db', JSON.stringify(database));

            document.getElementById('nama').value = '';
            document.getElementById('whatsapp').value = '';
            document.getElementById('keterangan').value = '';
            processEngine();
        });

        function processEngine() {
            const database = JSON.parse(localStorage.getItem('netland_isp_db')) || [];
            const tabel = document.getElementById('tabelPelanggan');
            tabel.innerHTML = '';

            let omset = 0;
            let countAktif = 0;
            let countIsolir = 0;
            let countBasic = 0;
            let countFamily = 0;

            const hariIni = new Date();

            if (database.length === 0) {
                tabel.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-gray-600 tracking-wide">Belum ada node data pelanggan yang terdeteksi di server lokal ini.</td></tr>`;
                updateCounters(0, 0, 0, 0);
                renderChart(0, 0);
                saringPelangganGangguan(); // Reset tabel gangguan
                return;
            }

            database.forEach((p) => {
                omset += p.harga;
                if(p.namaPaket.includes("Basic")) countBasic++;
                if(p.namaPaket.includes("Family")) countFamily++;

                const tglAwal = new Date(p.tanggalMulai);
                const tglJatuhTempo = new Date(tglAwal.getTime() + (30 * 24 * 60 * 60 * 1000));
                
                const selisihWaktu = tglJatuhTempo - hariIni;
                const sisaHari = Math.ceil(selisihWaktu / (1000 * 60 * 60 * 24));

                let statusBadge = '';
                let sisaHariText = '';

                if (sisaHari > 0) {
                    countAktif++;
                    statusBadge = `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 text-xs font-bold font-mono px-2.5 py-0.5 rounded-md">✔ LIVE ACTIVE</span>`;
                    sisaHariText = `<span class="text-gray-200 font-mono font-bold">${sisaHari} Hari</span> lagi`;
                } else {
                    countIsolir++;
                    statusBadge = `<span class="bg-rose-500/10 text-rose-500 border border-rose-500/20 text-xs font-bold font-mono px-2.5 py-0.5 rounded-md">⛔ BLOCKED (ISOLIR)</span>`;
                    sisaHariText = `<span class="text-rose-500 font-mono font-bold">EXPIRED</span>`;
                }

                const txtKeterangan = p.keterangan || '-';
                const currentODP = p.odp || 'UNSET';
                const formatRupiah = (angka) => "Rp " + angka.toLocaleString('id-ID');
                
                // Pesan Invoice Bulanan Normal
                const pesanWA = encodeURIComponent(
                    `*STRUK KONTAN RESMI NETLAND.id*\n\n` +
                    `Pelanggan yang terhormat:\n` +
                    `• ID User : *${p.nama}*\n` +
                    `• Paket : ${p.namaPaket}\n` +
                    `• Biaya : ${formatRupiah(p.harga)}\n` +
                    `• Info/Alamat : ${txtKeterangan}\n` +
                    `• Jalur ODP : ${currentODP}\n` +
                    `• Jatuh Tempo : ${tglJatuhTempo.toLocaleDateString('id-ID')}\n\n` +
                    `Status Akun saat ini terdeteksi *AKTIF*. Terima kasih telah memilih layanan internet ultra-cepat dari NETLAND.id.\n\n` +
                    `---------------------------------------\n` +
                    `💳 *METODE PILIHAN PEMBAYARAN*:\n\n` +
                    `Pembayaran cash dapat menghubungi:\n` +
                    `👤 *Mang Dayat* : 085710857846\n\n` +
                    `Atau via transfer bank:\n` +
                    `🏦 *BANK BCA* : 5290262188\n` +
                    `👤 *A.n.* : Muhamad Ridwan Arif\n` +
                    `---------------------------------------\n\n` +
                    `_Pesan ini digenerate otomatis oleh Core Billing Server._`
                );

                tabel.innerHTML += `
                    <tr class="hover:bg-gray-900/50 transition border-b border-gray-800/50">
                        <td class="p-4 font-bold text-white tracking-wide">${p.nama}</td>
                        <td class="p-4 font-mono text-xs text-gray-400">+${p.whatsapp}</td>
                        <td class="p-4"><span class="text-xs bg-slate-800 px-2 py-0.5 border border-gray-700 rounded text-gray-300 font-mono">${currentODP}</span></td>
                        <td class="p-4">
                            <span class="text-xs font-semibold px-2 py-1 rounded bg-gray-800 text-blue-400 border border-gray-700">${p.namaPaket}</span>
                        </td>
                        <td class="p-4 text-xs">${sisaHariText}</td>
                        <td class="p-4">${statusBadge}</td>
                        <td class="p-4 flex justify-center gap-2 items-center">
                            <a href="https://wa.me/${p.whatsapp}?text=${pesanWA}" target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs px-3 py-1.5 rounded-md shadow-md shadow-emerald-950 transition cursor-pointer">💬 Push WA</a>
                            <button onclick="perpanjangUser(${p.id})" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 text-xs px-2.5 py-1.5 rounded-md transition cursor-pointer">🔄 Renew</button>
                            <button onclick="hapusUser(${p.id})" class="bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 border border-rose-950 text-xs px-2.5 py-1.5 rounded-md transition cursor-pointer">Hapus</button>
                        </td>
                    </tr>
                `;
            });

            updateCounters(omset, database.length, countAktif, countIsolir);
            renderChart(countBasic, countFamily);
            saringPelangganGangguan(); // Refresh list gangguan otomatis jika ada data yang di-update
        }

        // ========================================================
        // LOGIK ENGINE BROADCAST NOTA GANGGUAN REALTIME
        // ========================================================
        function saringPelangganGangguan() {
            const selectedOdp = document.getElementById('select-odp-gangguan').value;
            const statusKerusakan = document.getElementById('input-estimasi-gangguan').value;
            const tbodyGangguan = document.getElementById('tabelGangguanODP');
            
            tbodyGangguan.innerHTML = '';

            if(!selectedOdp) {
                tbodyGangguan.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-gray-600 italic font-sans">Silahkan pilih target Sector ODP di atas untuk memulai broadcast.</td></tr>`;
                return;
            }

            const database = JSON.parse(localStorage.getItem('netland_isp_db')) || [];
            // Menyaring pelanggan yang ODP-nya sesuai dengan pilihan admin
            const pelangganTerdampak = database.filter(p => p.odp === selectedOdp);

            if(pelangganTerdampak.length === 0) {
                tbodyGangguan.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-amber-500/80 italic font-sans">0 Pelanggan Terdaftar di ${selectedOdp}. Tidak ada antrean broadcast.</td></tr>`;
                return;
            }

            pelangganTerdampak.forEach((user, index) => {
                const ticketID = "ERR-" + Math.floor(100000 + Math.random() * 900000);

                // FORMAT TEKS NOTA GANGGUAN MASSAL KHUSUS WHATSAPP
                const formatTeksNotaGangguan = 
`============================
*NETLAND.id CORE DIGITAL*
_Emergency Outage Notice_
============================

*FAKTUR GANGGUAN JARINGAN*
No. Tiket  : ${ticketID}
Status     : *LOS / JARINGAN DOWN*

Yth. Bapak/Ibu *${user.nama.toUpperCase()}*,
Sistem monitoring server mendeteksi adanya hilangnya redaman optik/gangguan massal pada jalur kabel FO yang mengarah ke perangkat Anda.

*RINCIAN INFRASTRUKTUR:*
• ID PPPoE  : ${user.nama.toUpperCase()}
• Jalur ODP : ${selectedOdp}
• Paket Data: ${user.namaPaket}

*STATUS PENANGANAN:*
*${statusKerusakan.toUpperCase()}*

Teknisi tim NOC kami sudah berada di lapangan untuk proses troubleshooting & splicing ulang core optik. Koneksi akan pulih normal tanpa perlu restart modem saat perbaikan rampung.

Mohon maaf atas gangguan kenyamanan ini.
_- NOC NETLAND.id Support -_`;

                const linkWhatsApp = `https://wa.me/${user.whatsapp}?text=${encodeURIComponent(formatTeksNotaGangguan)}`;

                tbodyGangguan.innerHTML += `
                    <tr class="hover:bg-red-950/20 transition border-b border-gray-800/60">
                        <td class="p-4 text-gray-500 font-sans text-center">${index + 1}</td>
                        <td class="p-4 text-gray-200 font-bold">${user.nama}</td>
                        <td class="p-4 text-red-400 font-semibold uppercase">${user.nama}</td>
                        <td class="p-4 text-gray-400">+${user.whatsapp}</td>
                        <td class="p-4 text-center">
                            <a href="${linkWhatsApp}" target="_blank" onclick="tandaiTerkirimTeks(this)" class="inline-flex items-center gap-1 bg-red-700 hover:bg-red-600 text-white font-sans font-bold text-xs px-3 py-1.5 rounded-md transition shadow cursor-pointer">
                                🚀 Kirim Nota Gangguan
                            </a>
                        </td>
                    </tr>
                `;
            });
        }

        function tandaiTerkirimTeks(element) {
            element.classList.remove('bg-red-700', 'hover:bg-red-600');
            element.classList.add('bg-gray-800', 'text-gray-500', 'border', 'border-gray-700');
            element.innerHTML = `✔ Nota Terkirim`;
        }

        function updateCounters(omset, total, aktif, isolir) {
            document.getElementById('statPendapatan').innerText = "Rp " + omset.toLocaleString('id-ID');
            document.getElementById('statTotal').innerText = total;
            document.getElementById('statAktif').innerText = aktif;
            document.getElementById('statIsolir').innerText = isolir;
        }

        function perpanjangUser(id) {
            let database = JSON.parse(localStorage.getItem('netland_isp_db')) || [];
            database = database.map(p => {
                if(p.id === id) {
                    p.tanggalMulai = new Date().toISOString().substring(0, 10);
                }
                return p;
            });
            localStorage.setItem('netland_isp_db', JSON.stringify(database));
            processEngine();
        }

        function hapusUser(id) {
            if(confirm('Hapus entitas pelanggan ini dari sistem inti?')) {
                let database = JSON.parse(localStorage.getItem('netland_isp_db')) || [];
                database = database.filter(p => p.id !== id);
                localStorage.setItem('netland_isp_db', JSON.stringify(database));
                processEngine();
            }
        }

        function syncToGithub() {
            const data = localStorage.getItem('netland_isp_db');
            if(!data || data === "[]") return alert("Tidak ada data untuk diekspor!");
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'netland_database_backup.json';
            a.click();
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (Array.isArray(parsedData)) {
                        localStorage.setItem('netland_isp_db', JSON.stringify(parsedData));
                        alert('Sinkronisasi Berhasil! Database NETLAND.id berhasil diperbarui.');
                        processEngine();
                    } else {
                        alert('Struktur file backup tidak valid!');
                    }
                } catch (err) {
                    alert('Gagal membaca file JSON!');
                }
            };
            reader.readAsText(file);
        }

        function renderChart(basic, family) {
            const ctx = document.getElementById('ispChart').getContext('2d');
            if (ispChartInstance) {
                ispChartInstance.destroy();
            }
            ispChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Paket Basic (30 Mbps)', 'Paket Family (50 Mbps)'],
                    datasets: [{
                        label: 'Jumlah Pelanggan Terpasang',
                        data: [basic, family],
                        backgroundColor: ['rgba(59, 130, 246, 0.6)', 'rgba(147, 51, 234, 0.6)'],
                        borderColor: ['#3b82f6', '#9333ea'],
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', stepSize: 1 } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        // Init System runtime
        processEngine();
    </script>
</body>
</html>
